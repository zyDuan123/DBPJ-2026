services:
  mysql:
    image: mysql:8.4.8
    container_name: dbpj-2026-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: campus_activity
      MYSQL_USER: campus
      MYSQL_PASSWORD: campus123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot123 --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
